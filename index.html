
<h2 class="sr-only">Crazy Car Racing Game — dodge obstacles, collect nitro, survive as long as possible</h2>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  #gc { display: block; background: #111; border-radius: 12px; width: 100%; cursor: none; }
  #ui { font-family: 'Courier New', monospace; }
  #hud { display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; background: #0a0a0a; border-radius: 12px 12px 0 0; border-bottom: 2px solid #ff3300; }
  .stat { color: #ff3300; font-size: 13px; font-weight: 700; letter-spacing: 1px; }
  .stat span { color: #fff; font-size: 16px; }
  #nitro-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; width: 80px; display: inline-block; vertical-align: middle; }
  #nitro-fill { height: 100%; background: linear-gradient(90deg, #00ffe0, #0088ff); width: 100%; transition: width 0.1s; border-radius: 4px; }
  #controls-hint { text-align: center; padding: 6px; background: #0a0a0a; color: #555; font-size: 11px; border-radius: 0 0 12px 12px; font-family: monospace; }
  #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); border-radius: 12px; z-index: 10; font-family: 'Courier New', monospace; }
  #overlay h1 { font-size: 40px; color: #ff3300; text-shadow: 0 0 20px #ff3300, 0 0 40px #ff6600; letter-spacing: 4px; margin-bottom: 8px; }
  #overlay p { color: #aaa; font-size: 13px; margin-bottom: 20px; }
  #overlay .btn { background: #ff3300; color: #fff; border: none; padding: 12px 32px; font-size: 16px; font-family: monospace; font-weight: 700; letter-spacing: 2px; cursor: pointer; border-radius: 6px; transition: transform 0.1s, box-shadow 0.1s; }
  #overlay .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #ff3300; }
  #wrap { position: relative; }
</style>
<div id="ui">
  <div id="hud">
    <div class="stat">SCORE <span id="score-val">0</span></div>
    <div class="stat">SPEED <span id="speed-val">0</span></div>
    <div class="stat">NITRO <span id="nitro-bar"><span id="nitro-fill"></span></span></div>
    <div class="stat">LIVES <span id="lives-val">❤️❤️❤️</span></div>
  </div>
  <div id="wrap">
    <canvas id="gc" width="680" height="420"></canvas>
    <div id="overlay">
      <h1>DEATHRUN</h1>
      <p>⚡ ARROW KEYS / WASD to move &nbsp;|&nbsp; SPACE for NITRO BOOST ⚡</p>
      <p id="hi-score" style="color:#ff9900; font-size:14px; margin-bottom:12px;">HI-SCORE: 0</p>
      <button class="btn" id="start-btn">START ENGINE</button>
    </div>
  </div>
  <div id="controls-hint">← → WASD MOVE &nbsp;|&nbsp; SPACE NITRO &nbsp;|&nbsp; Avoid REDS, grab BLUES (shield) and YELLOWS (nitro)</div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W = 680, H = 420;
canvas.width = W; canvas.height = H;

const ROAD_X = 60, ROAD_W = 560;
const LANE_W = ROAD_W / 4;
const LANES = [0,1,2,3].map(i => ROAD_X + LANE_W * i + LANE_W/2);

let state, hiScore = 0;

function initState() {
  return {
    running: false, gameOver: false,
    car: { x: LANES[1], y: H - 90, w: 40, h: 64, lane: 1, moving: false, invincible: 0 },
    obstacles: [], pickups: [], particles: [],
    road: { offset: 0 },
    score: 0, speed: 120, baseSpeed: 120,
    lives: 3, nitro: 100, nitroActive: false, nitroCooldown: 0,
    frame: 0, spawnTimer: 0, pickupTimer: 0,
    keys: {}
  };
}

state = initState();

function lerp(a, b, t) { return a + (b - a) * t; }

function spawnObstacle() {
  const lane = Math.floor(Math.random() * 4);
  const types = ['car','truck','cone','barrier'];
  const type = types[Math.floor(Math.random() * types.length)];
  const w = type === 'truck' ? 44 : 38;
  const h = type === 'truck' ? 80 : type === 'barrier' ? 24 : type === 'cone' ? 28 : 60;
  state.obstacles.push({ x: LANES[lane], y: -h - 10, w, h, type, lane,
    color: type === 'cone' ? '#ff6600' : type === 'barrier' ? '#ff0033' : `hsl(${Math.random()*360},80%,55%)`,
    speed: state.speed * (0.7 + Math.random() * 0.6)
  });
}

function spawnPickup() {
  const lane = Math.floor(Math.random() * 4);
  const type = Math.random() < 0.5 ? 'nitro' : 'shield';
  state.pickups.push({ x: LANES[lane], y: -20, r: 14, type, lane, pulse: 0 });
}

function addParticles(x, y, color, n=8) {
  for(let i=0;i<n;i++) {
    const a = Math.random()*Math.PI*2, s = 1+Math.random()*4;
    state.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 2, life: 1, color, r: 2+Math.random()*4 });
  }
}

function drawRoad() {
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(ROAD_X, 0, ROAD_W, H);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(0,0,ROAD_X,H);
  ctx.fillRect(ROAD_X+ROAD_W,0,W-ROAD_X-ROAD_W,H);

  // Grass
  const gPattern = (x, w) => {
    ctx.fillStyle = '#0f1a0a';
    ctx.fillRect(x, 0, w, H);
    for(let i=0;i<12;i++) {
      ctx.fillStyle = `rgba(30,60,15,${0.3+Math.random()*0.2})`;
      ctx.fillRect(x+Math.random()*w, Math.random()*H, 6, 20);
    }
  };

  // Road markings
  const dashH = 40, dashGap = 30;
  const totalH = dashH + dashGap;
  const offset = state.road.offset % totalH;
  ctx.strokeStyle = '#ff9900';
  ctx.lineWidth = 3;
  ctx.setLineDash([dashH, dashGap]);
  ctx.lineDashOffset = -offset;
  for(let l=1;l<4;l++) {
    const lx = ROAD_X + LANE_W * l;
    ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, H); ctx.stroke();
  }
  ctx.setLineDash([]);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(ROAD_X,0); ctx.lineTo(ROAD_X,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(ROAD_X+ROAD_W,0); ctx.lineTo(ROAD_X+ROAD_W,H); ctx.stroke();
}

function drawCar(x, y, w, h, color1, color2, dir=1, label='') {
  ctx.save();
  ctx.translate(x, y);
  if(dir === -1) { ctx.scale(1,-1); ctx.translate(0,-h); }
  const r = 6;
  ctx.beginPath();
  ctx.roundRect(-w/2, 0, w, h, r);
  ctx.fillStyle = color1;
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = color2;
  ctx.beginPath(); ctx.roundRect(-w/2+4, h*0.12, w-8, h*0.28, 4); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.6;
  ctx.beginPath(); ctx.roundRect(-w/2+6, h*0.14, w-12, h*0.22, 3); ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#ffcc00';
  ctx.beginPath(); ctx.roundRect(-w/2+2, h*0.05, 10, 6, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(w/2-12, h*0.05, 10, 6, 2); ctx.fill();
  ctx.fillStyle = '#ff3300';
  ctx.beginPath(); ctx.roundRect(-w/2+2, h*0.88, 10, 6, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(w/2-12, h*0.88, 10, 6, 2); ctx.fill();
  ctx.fillStyle = '#222';
  [[-w/2-3, h*0.12], [w/2-5, h*0.12], [-w/2-3, h*0.72], [w/2-5, h*0.72]].forEach(([tx,ty]) => {
    ctx.beginPath(); ctx.roundRect(tx, ty, 8, 16, 3); ctx.fill();
  });
  ctx.restore();
}

function drawPlayerCar() {
  const { car } = state;
  if(car.invincible > 0 && Math.floor(car.invincible/5) % 2 === 0) return;
  if(state.nitroActive) {
    for(let i=0;i<3;i++) {
      const dy = 8 + i*10;
      const flame = ctx.createLinearGradient(car.x, car.y+car.h+dy, car.x, car.y+car.h+dy+20);
      flame.addColorStop(0, 'rgba(0,200,255,0.9)');
      flame.addColorStop(1, 'rgba(0,80,255,0)');
      ctx.beginPath();
      ctx.ellipse(car.x+(i-1)*8, car.y+car.h+dy+10, 5+i*2, 12, 0, 0, Math.PI*2);
      ctx.fillStyle = flame; ctx.fill();
    }
  }
  drawCar(car.x, car.y, car.w, car.h, '#cc0033', '#80aaff');
  if(state.nitroActive) {
    ctx.shadowColor = '#00ccff'; ctx.shadowBlur = 20;
    drawCar(car.x, car.y, car.w, car.h, '#cc0033', '#80aaff');
    ctx.shadowBlur = 0;
  }
}

function drawObstacle(o) {
  if(o.type === 'cone') {
    ctx.fillStyle = '#ff6600';
    ctx.beginPath();
    ctx.moveTo(o.x, o.y); ctx.lineTo(o.x+14, o.y+o.h); ctx.lineTo(o.x-14, o.y+o.h);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(o.x-7, o.y+o.h*0.4, 14, 4);
  } else if(o.type === 'barrier') {
    ctx.fillStyle = '#ff0033';
    ctx.fillRect(o.x-o.w/2, o.y, o.w, o.h);
    ctx.fillStyle = '#fff';
    for(let i=0;i<4;i++) ctx.fillRect(o.x-o.w/2 + i*(o.w/4), o.y, o.w/8, o.h);
  } else {
    drawCar(o.x, o.y, o.w, o.h, o.color, '#333', -1);
  }
}

function drawPickup(p) {
  p.pulse += 0.1;
  const glow = (Math.sin(p.pulse)*0.3+0.7);
  ctx.save();
  ctx.globalAlpha = glow;
  if(p.type === 'nitro') {
    ctx.fillStyle = '#00ffe0';
    ctx.shadowColor = '#00ffe0'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#003344';
    ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('N', p.x, p.y);
  } else {
    ctx.fillStyle = '#ffdd00';
    ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 15;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#333300';
    ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('S', p.x, p.y);
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  state.particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  document.getElementById('score-val').textContent = Math.floor(state.score);
  document.getElementById('speed-val').textContent = Math.floor(state.speed) + ' km/h';
  document.getElementById('nitro-fill').style.width = state.nitro + '%';
  const hearts = ['','❤️','❤️❤️','❤️❤️❤️'][Math.max(0,Math.min(3,state.lives))];
  document.getElementById('lives-val').textContent = hearts;
}

function aabb(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax-aw/2 < bx+bw/2 && ax+aw/2 > bx-bw/2 && ay < by+bh && ay+ah > by;
}

function update(dt) {
  if(!state.running || state.gameOver) return;
  state.frame++;
  const spd = state.nitroActive ? state.speed * 2.2 : state.speed;
  state.road.offset += spd * dt;
  state.score += spd * dt * 0.05;
  state.speed = state.baseSpeed + state.score * 0.08;

  const k = state.keys;
  let targetLane = state.car.lane;
  if((k['ArrowLeft']||k['a']||k['A']) && state.car.lane > 0) { if(!state._leftHeld) { targetLane--; state._leftHeld = true; } }
  else { state._leftHeld = false; }
  if((k['ArrowRight']||k['d']||k['D']) && state.car.lane < 3) { if(!state._rightHeld) { targetLane++; state._rightHeld = true; } }
  else { state._rightHeld = false; }
  state.car.lane = targetLane;
  state.car.x = lerp(state.car.x, LANES[state.car.lane], 0.18);

  if((k[' ']||k['ArrowUp']||k['w']||k['W']) && state.nitro > 0 && state.nitroCooldown <= 0) {
    state.nitroActive = true;
    state.nitro = Math.max(0, state.nitro - 60*dt);
    if(state.nitro <= 0) { state.nitroActive = false; state.nitroCooldown = 3; }
    addParticles(state.car.x, state.car.y+state.car.h, '#00ffe0', 2);
  } else {
    state.nitroActive = false;
    if(state.nitroCooldown > 0) state.nitroCooldown -= dt;
    else state.nitro = Math.min(100, state.nitro + 12*dt);
  }

  state.spawnTimer -= dt;
  if(state.spawnTimer <= 0) {
    spawnObstacle();
    const gap = Math.max(0.4, 1.2 - state.score * 0.0003);
    if(Math.random() < 0.25) spawnObstacle();
    state.spawnTimer = gap;
  }
  state.pickupTimer -= dt;
  if(state.pickupTimer <= 0) { spawnPickup(); state.pickupTimer = 2.5+Math.random()*2; }

  state.obstacles.forEach(o => { o.y += (spd - o.speed) * dt + o.speed*dt; });
  state.obstacles = state.obstacles.filter(o => o.y < H+100);

  state.pickups.forEach(p => { p.y += spd * dt * 0.3; });
  state.pickups = state.pickups.filter(p => p.y < H+40);

  const car = state.car;
  if(car.invincible > 0) car.invincible--;

  state.obstacles.forEach((o, i) => {
    if(car.invincible > 0) return;
    if(aabb(car.x, car.y, car.w, car.h, o.x, o.y, o.w, o.h)) {
      addParticles(car.x, car.y, '#ff3300', 16);
      addParticles(o.x, o.y+o.h/2, o.color || '#ff6600', 12);
      state.obstacles.splice(i, 1);
      state.lives--;
      car.invincible = 80;
      if(state.lives <= 0) { state.gameOver = true; showGameOver(); }
    }
  });

  state.pickups.forEach((p, i) => {
    const dx = car.x - p.x, dy = (car.y+car.h/2) - p.y;
    if(Math.sqrt(dx*dx+dy*dy) < car.w/2+p.r) {
      if(p.type === 'nitro') { state.nitro = Math.min(100, state.nitro+40); addParticles(p.x,p.y,'#00ffe0',10); }
      else { car.invincible = 180; addParticles(p.x,p.y,'#ffdd00',10); }
      state.pickups.splice(i, 1);
    }
  });

  state.particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.025; });
  state.particles = state.particles.filter(p => p.life > 0);
}

function render() {
  ctx.clearRect(0,0,W,H);
  drawRoad();
  state.pickups.forEach(drawPickup);
  state.obstacles.forEach(drawObstacle);
  drawPlayerCar();
  drawParticles();

  if(state.nitroActive) {
    ctx.fillStyle = 'rgba(0,200,255,0.04)';
    ctx.fillRect(0,0,W,H);
    ctx.strokeStyle = 'rgba(0,200,255,0.15)';
    for(let i=0;i<6;i++) {
      const y = (state.road.offset * 3 + i*(H/6)) % H;
      ctx.beginPath(); ctx.moveTo(ROAD_X,y); ctx.lineTo(ROAD_X+ROAD_W,y); ctx.stroke();
    }
  }
  drawHUD();
}

let last = 0;
function loop(ts) {
  const dt = Math.min((ts - last)/1000, 0.05);
  last = ts;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

function showGameOver() {
  if(state.score > hiScore) hiScore = Math.floor(state.score);
  document.getElementById('hi-score').textContent = 'HI-SCORE: ' + hiScore;
  const ol = document.getElementById('overlay');
  ol.querySelector('h1').textContent = 'DEAD';
  ol.querySelector('p').textContent = `SCORE: ${Math.floor(state.score)}  |  SPEED: ${Math.floor(state.speed)} km/h`;
  document.getElementById('start-btn').textContent = 'TRY AGAIN';
  ol.style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', () => {
  state = initState();
  state.running = true;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('overlay').querySelector('h1').textContent = 'DEATHRUN';
  document.getElementById('start-btn').textContent = 'START ENGINE';
});

document.addEventListener('keydown', e => {
  state.keys[e.key] = true;
  if([' ','ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { state.keys[e.key] = false; });

let touchStartX = null;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; e.preventDefault(); }, {passive:false});
canvas.addEventListener('touchend', e => {
  if(touchStartX !== null) {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(dx < -20 && state.car.lane > 0) state.car.lane--;
    if(dx > 20 && state.car.lane < 3) state.car.lane++;
    touchStartX = null;
  }
  e.preventDefault();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  if(e.touches.length > 0) { state.keys[' '] = true; }
  e.preventDefault();
}, {passive:false});

requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
